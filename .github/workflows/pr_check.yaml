name: PR Checks

on:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  pr-validation:
    runs-on: ubuntu-latest

    env:
      TEMPLATE_FILE: ${{ vars.TEMPLATE_FILE }}
      PARAM_FILE: ${{ vars.PARAM_FILE }}
      VALIDATION_RG: rg-pr-validation-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 1.1 Task: "Syntax build" => Ensure Bicep compiles
      # SOC2: CC5.2 (Technology controls)
      - name: Syntax build (Bicep compile)
        run: |
          az bicep build --file "$TEMPLATE_FILE"

      # 1.2 Task: "Lint" => Check code quality and best practices
      # SOC2: CC5.3 (Policies & procedures), CC5.2 (Technology controls)
      - name: Lint Bicep
        run: |
          az bicep lint --file "$TEMPLATE_FILE"

      # 1.3 Task: "Secret scan" => Detect secrets in the repository
      # SOC2: CC6.1, CC6.7 (Access + data protection)
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 1.4 Task: "Checkov" => Validate security configuration
      # SOC2: CC6.1, CC6.7 (Security controls)
      - name: Checkov scan (IaC security)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .

      # ------------------------------------------------------------
      # Planned next steps (next iterations of the pipeline)
      #
      # 1.5 Parameter validation => Validate env, location, SKU
      # SOC2: CC3.2, CC5.1 (Environment + configuration validation)
      #
      # 1.6 Validate => Ensure template is valid for Azure
      # SOC2: CC3.2, CC5.2 (Risk + tech validation)
      #
      # 1.7 What-if => Preview infrastructure changes
      # SOC2: CC3.2 (Change risk analysis)
      #
      # 1.8 Fail on dangerous changes => Block deletes/replacements
      # SOC2: CC3.2, CC5.1 (Risk mitigation controls)
      #
      # 1.9 Artifact packaging => Freeze validated template
      # SOC2: CC5.2, CC8.1 (Change integrity + release control)
      #
      # 1.10 Branch protection => Enforce PR & approvals
      # SOC2: CC1.2, CC6.3 (Governance + access control)
      # Configured in GitHub repository settings
      #
      # 1.11 Action version pinning => Prevent supply chain risk
      # SOC2: CC6.7, CC5.2 (Supply chain + integrity control)
      # ------------------------------------------------------------